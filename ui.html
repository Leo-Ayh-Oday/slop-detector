<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codebase Q&A</title>
<style>
:root{--bg:#0a0a0a;--srf:#111;--srf2:#1a1a1a;--bd:#2a2a2a;--tx:#e4e4e4;--mu:#777;--ac:#f0f0f0;--gr:#4ade80;--rd:#f87171}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--tx);display:flex;height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
#sidebar{width:320px;background:var(--srf);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:none}
#sidebar::-webkit-scrollbar{display:none}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#hd{padding:20px 24px;border-bottom:1px solid var(--bd);position:relative}
#hd h1{font-size:15px;font-weight:500;letter-spacing:.02em}
#hd span{font-size:11px;color:var(--mu);display:block;margin-top:3px}
#set-btn{position:absolute;top:18px;right:20px;background:none;border:none;color:var(--mu);cursor:pointer;font-size:14px;opacity:.4;transition:.15s}
#set-btn:hover{opacity:1}
#inp{padding:16px 24px}
#inp label{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}
#inp input{width:100%;padding:8px 10px;background:var(--srf2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font:inherit;font-size:12px;margin-bottom:8px}
#inp input:focus{outline:none;border-color:#555}
.btn{width:100%;padding:8px 0;border:1px solid var(--ac);border-radius:4px;background:transparent;color:var(--ac);cursor:pointer;font:inherit;font-size:11px;text-transform:uppercase;letter-spacing:.04em;transition:.15s}
.btn:hover{background:#1c1c1c}.btn:disabled{opacity:.3;cursor:default}
#status{font-size:10px;color:var(--mu);margin-top:6px;min-height:16px}
#qa{flex:1;display:flex;flex-direction:column;overflow:hidden}
#chat{flex:1;overflow-y:auto;padding:20px 28px;scrollbar-width:none}
#chat::-webkit-scrollbar{display:none}
.qa-item{margin-bottom:16px;animation:fadeIn .3s}
.qa-item .q{font-size:13px;color:var(--mu);margin-bottom:6px}
.qa-item .a{font-size:14px;line-height:1.8;white-space:pre-wrap}
.qa-item .refs{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.qa-item .ref{padding:3px 8px;background:var(--srf2);border-radius:3px;font-size:10px;color:var(--mu);cursor:pointer;font-family:monospace;transition:.15s}
.qa-item .ref:hover{color:var(--ac);border-color:#555}
#ask-bar{padding:14px 28px;border-top:1px solid var(--bd);display:flex;gap:10px}
#ask-bar input{flex:1;padding:8px 12px;background:var(--srf2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font:inherit;font-size:13px}
#ask-bar input:focus{outline:none;border-color:#555}
#ask-bar button{padding:8px 16px;border:1px solid var(--ac);border-radius:4px;background:transparent;color:var(--ac);cursor:pointer;font:inherit;font-size:12px;transition:.15s;white-space:nowrap}
#ask-bar button:hover{background:#1c1c1c}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#1a1a1a;gap:12px;font-size:13px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:199}
.overlay.on{display:block}
.panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;background:var(--srf);border:1px solid var(--bd);border-radius:6px;padding:24px;z-index:200}
.panel.on{display:block}
.panel h3{font-size:14px;font-weight:500;margin-bottom:16px}
.panel label{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;display:block;margin:12px 0 4px}
.panel input,.panel select{width:100%;padding:8px 10px;background:var(--srf2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font:inherit;font-size:12px}
.panel .row{display:flex;gap:8px;margin-top:16px}
.panel .btn-save{border:1px solid var(--ac);background:transparent;color:var(--ac);flex:1;padding:8px 0;border-radius:4px;cursor:pointer;font:inherit;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.panel .btn-cancel{flex:1;padding:8px 0;border:1px solid transparent;background:transparent;color:var(--mu);cursor:pointer;font:inherit;font-size:11px}
.code-snip{background:var(--srf2);border:1px solid var(--bd);border-radius:4px;padding:8px 12px;margin:4px 0;font-family:monospace;font-size:11px;white-space:pre-wrap;max-height:200px;overflow-y:auto;scrollbar-width:none}
.code-snip::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="sidebar">
  <div id="hd">
    <h1>Codebase Q&A</h1>
    <span>Ask questions about any repo</span>
    <button id="set-btn" onclick="tgSet()" title="Settings">&#9881;</button>
  </div>
  <div id="inp">
    <label>GitHub URL</label>
    <input id="repo-url" placeholder="https://github.com/user/repo">
    <button class="btn" onclick="doIndex()" id="index-btn">Index Repository</button>
    <div id="status"></div>
  </div>
</div>
<div id="main">
  <div id="qa">
    <div id="chat">
      <div class="empty" id="empty"><div style="font-size:32px;color:#222">⌘</div><div>Index a repo to start asking questions</div></div>
    </div>
    <div id="ask-bar">
      <input id="question" placeholder="Ask about the codebase..." onkeydown="if(event.key==='Enter')doAsk()">
      <button onclick="doAsk()" id="ask-btn" disabled>Ask</button>
    </div>
  </div>
</div>
<div class="overlay" id="ov" onclick="tgSet()"></div>
<div class="panel" id="st">
  <h3>Settings</h3>
  <label>API Key</label>
  <input id="set-key" type="password" placeholder="sk-... (leave blank for env)">
  <label>Model</label>
  <select id="set-model"><option value="deepseek-v4-pro">DeepSeek V4 Pro</option><option value="deepseek-chat">DeepSeek V4 Flash</option></select>
  <div class="row">
    <button class="btn-save" onclick="svSet()">Save</button>
    <button class="btn-cancel" onclick="tgSet()">Cancel</button>
  </div>
</div>
<script>
let indexed=false;
function tgSet(){const p=document.getElementById('st');const wasOpen=p.classList.contains('on');p.classList.toggle('on');document.getElementById('ov').classList.toggle('on');if(wasOpen)svSet()}
function ldSet(){try{const s=JSON.parse(localStorage.getItem('qa_settings')||'{}');const g=id=>document.getElementById(id);if(!g('set-model'))return;g('set-model').value=s.model||'deepseek-v4-pro';g('set-key').value=s.api_key||''}catch(e){}}
function svSet(){const s={model:document.getElementById('set-model').value,api_key:document.getElementById('set-key').value};localStorage.setItem('qa_settings',JSON.stringify(s));const btn=document.querySelector('.btn-save');btn.textContent='Saved!';setTimeout(()=>btn.textContent='Save',1500);tgSet()}
function getSet(){return JSON.parse(localStorage.getItem('qa_settings')||'{}')}
async function doIndex(){
  const url=document.getElementById('repo-url').value.trim();if(!url)return;
  const btn=document.getElementById('index-btn');btn.disabled=true;btn.textContent='Indexing...';
  document.getElementById('status').textContent='Cloning...';
  try{
    const r=await fetch('/api/index',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({repo_url:url})});
    if(!r.ok)throw new Error(await r.text());
    const d=await r.json();
    document.getElementById('status').textContent=`Indexed ${d.chunks} chunks`;
    indexed=true;document.getElementById('ask-btn').disabled=false;
    document.getElementById('empty')?.remove();
  }catch(e){document.getElementById('status').textContent='Error: '+e.message}
  btn.disabled=false;btn.textContent='Index Repository';
}
async function doAsk(){
  const q=document.getElementById('question').value.trim();if(!q||!indexed)return;
  const inp=document.getElementById('question');inp.disabled=true;document.getElementById('ask-btn').disabled=true;
  document.getElementById('empty')?.remove();
  const chat=document.getElementById('chat');
  const div=document.createElement('div');div.className='qa-item';
  div.innerHTML=`<div class="q">Q: ${q}</div><div class="a">Thinking...</div>`;
  chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
  try{
    const r=await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q,settings:getSet()})});
    if(!r.ok)throw new Error(await r.text());
    const d=await r.json();
    let refs='';
    if(d.chunks?.length)refs='<div class="refs">'+d.chunks.map(c=>`<span class="ref" title="${c.file}:${c.start}-${c.end}">${c.file.split('/').pop()}:${c.start}</span>`).join('')+'</div>';
    div.innerHTML=`<div class="q">Q: ${q}</div><div class="a">${d.answer}</div>${refs}`;
  }catch(e){div.innerHTML=`<div class="q">Q: ${q}</div><div class="a" style="color:var(--rd)">Error: ${e.message}</div>`}
  inp.disabled=false;inp.value='';document.getElementById('ask-btn').disabled=false;inp.focus();
  chat.scrollTop=chat.scrollHeight;
}
document.addEventListener('DOMContentLoaded',ldSet);
</script>
</body>
</html>
